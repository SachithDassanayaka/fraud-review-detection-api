name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # (OPTIONAL) Add this RIGHT UNDER runs-on
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Use matrix variable instead of hardcoding
          python-version: ${{ matrix.python-version }}

      # (OPTIONAL) Add cache step BEFORE installing dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx flake8

      # (OPTIONAL) Lint BEFORE tests
      - name: Run linting
        run: |
          flake8 .

      - name: Run tests
        run: |
          pytest